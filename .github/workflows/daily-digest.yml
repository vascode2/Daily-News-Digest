name: '[AUTO] Daily News Digest'

# Trigger after YOUTUBE_COOKIES_B64 secret refresh (2026-05-12)
on:
  schedule:
    # GitHub cron is UTC only. 7 AM America/New_York is 11:00 UTC during
    # daylight saving time and 12:00 UTC during standard time.
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily-digest.yml'
      - 'scripts/**'
      - 'config/**'
      - 'agents/**'
      - 'package*.json'
  workflow_dispatch: {}  # Manual trigger from GitHub UI

permissions:
  contents: write  # output/ 커밋 권한

concurrency:
  group: daily-digest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check 7 AM local time
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual or push verification run: proceeding."
            exit 0
          fi

          schedule="${{ github.event.schedule }}"
          ny_offset=$(TZ=America/New_York date +%z)

          if { [ "$schedule" = "0 11 * * *" ] && [ "$ny_offset" = "-0400" ]; } || \
             { [ "$schedule" = "0 12 * * *" ] && [ "$ny_offset" = "-0500" ]; }; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled 7 AM America/New_York slot: proceeding."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Non-7 AM America/New_York slot (${schedule}, offset ${ny_offset}): skipping."
          fi

      - uses: actions/checkout@v5
        if: steps.gate.outputs.should_run == 'true'

      - uses: actions/setup-node@v5
        if: steps.gate.outputs.should_run == 'true'
        with:
          node-version: '22'

      - name: Install yt-dlp (latest GitHub release)
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Verify tools
        if: steps.gate.outputs.should_run == 'true'
        run: |
          node --version
          yt-dlp --version

      - name: Collect yesterday's videos
        if: steps.gate.outputs.should_run == 'true'
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
          DIGEST_TIMEZONE: America/New_York   # User in EST/EDT
        run: npm run collect

      - name: Summarize via Gemini
        if: steps.gate.outputs.should_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        run: npm run summarize

      - name: Review summaries
        if: steps.gate.outputs.should_run == 'true'
        id: review
        run: npm run review

      - name: Publish to Notion + repo
        if: steps.gate.outputs.should_run == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          NOTION_ROOT_TITLE: News Digest
          DIGEST_TIMEZONE: America/New_York
        run: npm run publish

      - name: Commit output back to repo
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new digest output to commit."
            exit 0
          fi
          git commit -m "Auto: daily news digest $(date -u +%Y-%m-%d)"
          # Retry up to 3 times in case remote moved while we were running
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          echo "Push failed after 3 retries"; exit 1
