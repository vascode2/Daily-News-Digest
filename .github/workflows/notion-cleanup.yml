name: '[MANUAL] Notion Cleanup'

# One-time / on-demand maintenance: de-duplicate Notion date pages and reorder
# them so the newest digest is on top. Safe to re-run.

on:
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild every output/*.md (true) or only dates already in Notion (false)'
        type: boolean
        default: false
      cleanup_limit:
        description: 'Keep only the N most recent pages (0 = no limit)'
        type: string
        default: '0'
      dry_run:
        description: 'Log actions without changing Notion'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: notion-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Notion cleanup (dedup + newest-on-top)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          NOTION_ROOT_TITLE: News Digest
          REBUILD_ALL: ${{ inputs.rebuild_all }}
          CLEANUP_LIMIT: ${{ inputs.cleanup_limit }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npm run notion:cleanup
